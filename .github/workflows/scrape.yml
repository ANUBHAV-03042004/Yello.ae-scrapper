name: Yello Scraper

on:
  workflow_dispatch:
    inputs:
      keyword:
        description: "Search keyword (e.g. restaurant)"
        required: true
      location:
        description: "Location (e.g. Dubai)"
        required: true

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run scraper
        run: |
          python scraper.py \
            --keyword "${{ github.event.inputs.keyword }}" \
            --location "${{ github.event.inputs.location }}" | tee scraper_output.txt
          OUTPUT=$(grep "OUTPUT_FILE=" scraper_output.txt | cut -d= -f2)
          echo "OUTPUT_FILE=$OUTPUT" >> $GITHUB_ENV
        env:
          YELLO_EMAIL: ${{ secrets.YELLO_EMAIL }}
          YELLO_PASSWORD: ${{ secrets.YELLO_PASSWORD }}

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: scrape-results
          path: "*.xlsx"
          retention-days: 7

      - name: Commit and push Excel results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Only stage and commit if excel files exist to prevent crashes on 0 results
          if ls *.xlsx 1> /dev/null 2>&1; then
            git add -f *.xlsx
            git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-scrape: ${{ github.event.inputs.keyword }} in ${{ github.event.inputs.location }}" && git push)
          else
            echo "No .xlsx files found to commit."
          fi